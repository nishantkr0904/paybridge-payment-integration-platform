services:
  mysql:
    image: mysql:8.4
    container_name: paybridge-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: paybridge
      MYSQL_USER: paybridge
      MYSQL_PASSWORD: change_me
      MYSQL_ROOT_PASSWORD: root_change_me
    ports:
      - "3306:3306"
    volumes:
      - paybridge-mysql-data:/var/lib/mysql
      - ./database:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  paybridge-mysql-data:
